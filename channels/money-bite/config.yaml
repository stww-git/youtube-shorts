# Money Bite 채널 설정 파일
# 금융/투자 입문자를 위한 YouTube Shorts 채널

# 채널 표시 이름
display_name: "Money Bite"

# 환경변수에서 읽어올 토큰 키 이름
env_token_key: "REFRESH_TOKEN_MONEY_BITE"

# 업로드 설정
upload:
  # 제목 형식
  title_format: "{title} #주식 #금융 #투자"
  
  # 설명
  description: "매일 30초 금융 상식 💰 하루 한 개, 쉽고 빠르게 배우는 돈 공부!\n\n⚠️ 면책 조항: 본 콘텐츠는 교육 목적이며 투자 조언이 아닙니다. 투자 결정 전 반드시 본인의 판단 하에 진행해주세요.\n\n#금융 #투자 #주식 #재테크 #금융상식 #돈공부 #경제 #주식초보 #shorts"
  
  # 태그
  tags: ["금융", "투자", "주식", "재테크", "금융상식", "돈공부", "경제", "주식초보", "복리", "ETF", "적립식투자", "money bite", "shorts"]
  
  # 공개 설정
  privacy_status: "private"
  
  # 아동용 컨텐츠 여부
  made_for_kids: false

  # 카테고리 ID (22: People & Blogs, 27: Education)
  category_id: "27"

# 프롬프트 설정
prompts:
  use_custom: true

# 채널별 리소스 경로 설정
paths:
  use_custom_fonts: true
  use_custom_output: true
  use_custom_config: true
