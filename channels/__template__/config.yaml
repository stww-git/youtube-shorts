# 채널 설정 파일 (Channel Configuration)
# 이 파일을 수정하여 채널별 업로드 설정을 변경할 수 있습니다.

# 채널 표시 이름 (YouTube에 표시되지 않음, 로컬 식별용)
# 예: "속편한밥상"
display_name: "채널 템플릿"

# 환경변수에서 읽어올 토큰 키 이름
# .env 또는 GitHub Secrets에 이 이름으로 토큰을 저장해야 합니다.
# 예: REFRESH_TOKEN_SOKPYEONHAN
env_token_key: "REFRESH_TOKEN_TEMPLATE"

# 업로드 설정
upload:
  # 제목 형식 (사용 가능 변수: {title}, {category})
  # 예: "{title} #건강 #요리"
  title_format: "{title}"
  
  # 설명 (빈 문자열로 두면 설명 없음)
  # 사용 가능 변수: {title}, {original_title}, {url}
  # 예: "원본 레시피: {original_title}\n출처: {url}"
  description: ""
  
  # 태그 (리스트 형태)
  # 예: ["요리", "레시피", "건강", "다이어트"]
  tags: []
  
  # 공개 설정 (private, unlisted, public)
  privacy_status: "private"
  
  # 아동용 컨텐츠 여부
  made_for_kids: false

  # 카테고리 ID (22: 인물/블로그, 26: 노하우/스타일)
  # 예: "26" (요리 채널 권장)
  category_id: "26"

# 프롬프트 설정
prompts:
  # true: 같은 폴더의 prompts.py 사용 (채널 전용 말투 적용)
  # false: 기본 프롬프트(src/prompts.py) 사용
  # 예: true (속편한밥상은 전용 프롬프트 사용)
  use_custom: true

# 채널별 리소스 경로 설정
# true로 설정하면 채널 폴더 내의 해당 리소스 사용
# 예: 속편한밥상은 모두 true로 설정하여 독립적으로 운영
paths:
  use_custom_fonts: true     # 채널폴더/fonts/ (예: GmarketSans)
  use_custom_output: true   # 채널폴더/output/ (결과물 격리)
  use_custom_config: true   # 채널폴더/src/config/ (전용 설정)
