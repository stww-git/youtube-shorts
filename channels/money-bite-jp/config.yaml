# Money Bite 채널 설정 파일
# 금융/투자 입문자를 위한 YouTube Shorts 채널

# 채널 표시 이름
display_name: "Money Bite JP"

# 환경변수에서 읽어올 토큰 키 이름
env_token_key: "REFRESH_TOKEN_MONEY_BITE_JP"

# 업로드 설정
upload:
  # 제목 형식
  title_format: "{title}"
  
  # 설명
  description: "毎日30秒で学ぶ金融知識 💰 1日1本、簡単で素早く学べるお金の勉強！\n\n⚠️ 免責事項：本コンテンツは教育目的であり、投資に関するアドバイスではありません。投資のご判断は必ずご自身で行ってください。\n\n#金融 #投資 #株式 #資産運用 #お金の勉強 #経済 #株初心者 #積立投資 #moneybite #shorts"
  
  # 태그
  tags: ["金融", "投資", "株式", "資産運用", "金融知識", "お金の勉強", "経済", "株初心者", "複利", "ETF", "積立投資", "money bite", "shorts"]
  
  # 공개 설정
  privacy_status: "private"
  
  # 아동용 컨텐츠 여부
  made_for_kids: false

  # 카테고리 ID (22: People & Blogs, 27: Education)
  category_id: "27"

# 프롬프트 설정
prompts:
  use_custom: true

# 채널별 리소스 경로 설정
paths:
  use_custom_fonts: true
  use_custom_output: true
  use_custom_config: true
