name: 자동 영상 업로드

on:
  schedule:
    # sokpyeonhan: 07:00, 12:00, 18:00 KST
    - cron: '0 22 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    # test-channel-trial1: 07:30, 12:30, 18:30 KST
    - cron: '30 22 * * *'
    - cron: '30 3 * * *'
    - cron: '30 9 * * *'
  workflow_dispatch:
    inputs:
      channel:
        description: '업로드할 채널 ID'
        required: true
        type: choice
        options:
          - sokpyeonhan
          - test-channel-trial1

permissions:
  contents: write

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

jobs:
  sokpyeonhan:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'sokpyeonhan' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '0 22 * * *' ||
        github.event.schedule == '0 3 * * *' ||
        github.event.schedule == '0 9 * * *'
      )
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check if channel is enabled
      id: check
      run: |
        if grep -A3 '"sokpyeonhan"' main.py | grep -q '"enabled": False'; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⏭️ sokpyeonhan 채널이 비활성화됨 - 스킵"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    
    - uses: actions/setup-python@v5
      if: steps.check.outputs.skip != 'true'
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      if: steps.check.outputs.skip != 'true'
      run: |
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y ffmpeg
    
    - name: Generate and Upload Video
      if: steps.check.outputs.skip != 'true'
      env:
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN_SOKPYEONHAN }}
      run: python main.py --channel sokpyeonhan --upload
    
    - name: Update History
      if: steps.check.outputs.skip != 'true'
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add channels/sokpyeonhan/history.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Update history (sokpyeonhan) [skip ci]"
        git push || true
    
    - uses: actions/upload-artifact@v4
      if: steps.check.outputs.skip != 'true'
      with:
        name: sokpyeonhan-${{ github.run_number }}
        path: channels/sokpyeonhan/output/**/*.mp4
        retention-days: 1
        if-no-files-found: error

  test-channel-trial1:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'test-channel-trial1' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '30 22 * * *' ||
        github.event.schedule == '30 3 * * *' ||
        github.event.schedule == '30 9 * * *'
      )
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check if channel is enabled
      id: check
      run: |
        if grep -A3 '"test-channel-trial1"' main.py | grep -q '"enabled": False'; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⏭️ test-channel-trial1 채널이 비활성화됨 - 스킵"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
    
    - uses: actions/setup-python@v5
      if: steps.check.outputs.skip != 'true'
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      if: steps.check.outputs.skip != 'true'
      run: |
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y ffmpeg
    
    - name: Generate and Upload Video
      if: steps.check.outputs.skip != 'true'
      env:
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN_TEST_CHANNEL_TRIAL1 }}
      run: python main.py --channel test-channel-trial1 --upload
    
    - name: Update History
      if: steps.check.outputs.skip != 'true'
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add channels/test-channel-trial1/history.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Update history (test-channel-trial1) [skip ci]"
        git push || true
    
    - uses: actions/upload-artifact@v4
      if: steps.check.outputs.skip != 'true'
      with:
        name: test-channel-trial1-${{ github.run_number }}
        path: channels/test-channel-trial1/output/**/*.mp4
        retention-days: 1
        if-no-files-found: error

