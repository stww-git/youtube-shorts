name: 자동 영상 업로드

on:
  schedule:
    # sokpyeonhan: 07:00, 12:00, 18:00 KST
    - cron: '0 22 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    # test-channel-trial1: 07:30, 12:30, 18:30 KST
    - cron: '30 22 * * *'
    - cron: '30 3 * * *'
    - cron: '30 9 * * *'
    # family-health-kr
    - cron: '30 21 * * *'  # KST 06:30
    - cron: '30 2 * * *'  # KST 11:30
    - cron: '30 8 * * *'  # KST 17:30
    # money-bite: 07:15, 12:15, 18:15 KST (한국 타겟)
    - cron: '15 22 * * *'  # KST 07:15
    - cron: '15 3 * * *'   # KST 12:15
    - cron: '15 9 * * *'   # KST 18:15
    # money-bite-jp (Japan target) 08:00, 13:00, 19:00 JST
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '0 4 * * *'    # JST 13:00
    - cron: '0 10 * * *'   # JST 19:00
    # money-bite-us (US EST optimal times)
    - cron: '0 14 * * *'   # 9 AM EST / 6 AM PST — morning commute
    - cron: '30 17 * * *'  # 12:30 PM EST / 9:30 AM PST — lunch east, morning west
    - cron: '0 1 * * *'    # 8 PM EST / 5 PM PST — evening peak
  workflow_dispatch:
    inputs:
      channel:
        description: '업로드할 채널 ID'
        required: true
        type: choice
        options:
          - sokpyeonhan
          - test-channel-trial1
          - family-health-kr
          - money-bite
          - money-bite-jp
          - money-bite-us

permissions:
  contents: write

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

jobs:
  sokpyeonhan:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'sokpyeonhan' ||
      github.event_name == 'schedule' && (
        github.event.schedule == '0 22 * * *' ||
        github.event.schedule == '0 3 * * *' ||
        github.event.schedule == '0 9 * * *'
      )
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check if channel is enabled
      id: check
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          if grep -A3 '"sokpyeonhan"' main.py | grep -q '"enabled": False'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ sokpyeonhan 채널이 비활성화됨 - 스킵"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "🚀 수동 실행 - enabled 체크 건너뜀"
        fi
    
    - uses: actions/setup-python@v5
      if: steps.check.outputs.skip != 'true'
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      if: steps.check.outputs.skip != 'true'
      run: |
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y ffmpeg
    
    - name: Generate and Upload Video
      if: steps.check.outputs.skip != 'true'
      env:
        REFRESH_TOKEN_SOKPYEONHAN: ${{ secrets.REFRESH_TOKEN_SOKPYEONHAN }}
      run: python main.py --channel sokpyeonhan --upload
    
    - name: Update History
      if: steps.check.outputs.skip != 'true'
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add channels/sokpyeonhan/history.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Update history (sokpyeonhan) [skip ci]"
        git push || true
    
    - uses: actions/upload-artifact@v4
      if: steps.check.outputs.skip != 'true'
      with:
        name: sokpyeonhan-${{ github.run_number }}
        path: channels/sokpyeonhan/output/**/*.mp4
        retention-days: 1
        if-no-files-found: error

