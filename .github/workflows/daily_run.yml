name: Daily Recipe Video Generation

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      channel:
        description: '업로드할 채널 ID (channels/ 폴더명)'
        required: false
        default: 'sokpyeonhan'
        type: choice
        options:
          - sokpyeonhan
          # 새 채널 추가 시 여기에 옵션 추가

# 저장소에 쓰기 권한 부여 (History 파일 업데이트용)
permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest
    # main 브랜치에서만 실행되도록 조건 추가 (schedule은 기본적으로 default branch에서 실행되지만 명시적 확인)
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # pip 의존성 캐싱 활성화 (속도 개선)

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # FFmpeg 등 필요한 시스템 패키지 설치
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Run Recipe Video Generator
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        # 기본 토큰 (스케줄 실행 시 사용)
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        # 채널별 토큰 (새 채널 추가 시 여기에 추가)
        REFRESH_TOKEN_SOKPYEONHAN: ${{ secrets.REFRESH_TOKEN_SOKPYEONHAN }}
      run: |
        # 스케줄 실행 시 기본 채널, 수동 실행 시 선택한 채널 사용
        CHANNEL="${{ github.event.inputs.channel || 'sokpyeonhan' }}"
        python main_recipe.py --channel "$CHANNEL" --upload

    - name: Commit and Push History
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        # history 파일이 변경되었는지 확인
        if [ -f recipe_history.json ]; then
          git add recipe_history.json
          # 변경사항이 있을 때만 커밋
          git diff --staged --quiet || git commit -m "Update recipe history [skip ci]"
          git push
        fi
        
    - name: Upload Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: recipe-video
        path: output/**/*.mp4  # output 폴더 및 하위 폴더의 mp4 파일 업로드
        retention-days: 1

