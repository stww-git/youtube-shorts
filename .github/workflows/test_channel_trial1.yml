name: Test Channel Trial1 자동 업로드

on:
  schedule:
    # 하루 3회 업로드 (한국 시간 기준)
    # sokpyeonhan과 30분 간격 유지
    - cron: '30 22 * * *'  # 오전 7시 30분 (UTC 22:30 = KST 07:30)
    - cron: '30 3 * * *'   # 오후 12시 30분 (UTC 03:30 = KST 12:30)
    - cron: '30 9 * * *'   # 저녁 6시 30분 (UTC 09:30 = KST 18:30)
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Run Video Generator
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN_TEST_CHANNEL_TRIAL1 }}
      run: |
        python main.py --channel test-channel-trial1 --upload

    - name: Commit and Push History
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        if [ -f recipe_history.json ]; then
          git add recipe_history.json
          git diff --staged --quiet || git commit -m "Update recipe history (test-channel-trial1) [skip ci]"
          git push
        fi
        
    - name: Upload Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-channel-trial1-video-${{ github.run_number }}
        path: channels/test-channel-trial1/output/**/*.mp4
        retention-days: 1
