name: 속편한밥상 (sokpyeonhan) 자동 업로드

on:
  schedule:
    # 하루 3회 업로드 (한국 시간 기준)
    # YouTube Shorts 최적 시간대: 아침 출근, 점심, 저녁 퇴근
    - cron: '0 22 * * *'   # 오전 7시 (UTC 22:00 = KST 07:00)
    - cron: '0 3 * * *'    # 정오 12시 (UTC 03:00 = KST 12:00)
    - cron: '0 9 * * *'    # 저녁 6시 (UTC 09:00 = KST 18:00)
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Run Video Generator
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN_SOKPYEONHAN }}
      run: |
        python main.py --channel sokpyeonhan --upload

    - name: Commit and Push History
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        if [ -f recipe_history.json ]; then
          git add recipe_history.json
          git diff --staged --quiet || git commit -m "Update recipe history (sokpyeonhan) [skip ci]"
          git push
        fi
        
    - name: Upload Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sokpyeonhan-video-${{ github.run_number }}
        path: channels/sokpyeonhan/output/**/*.mp4
        retention-days: 1
