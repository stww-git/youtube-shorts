# 채널별 업로드 스케줄 설정
# 
# 형식:
#   채널ID:
#     name: "표시 이름"
#     enabled: true/false    # 스케줄 실행 여부
#     times: ["HH:MM", ...]  # 한국 시간 (KST)
#
# enabled: false로 설정하면 해당 채널은 스케줄 실행에서 제외됩니다.

channels:
  sokpyeonhan:
    name: "속편한밥상"
    enabled: true
    times:
      - "07:00"
      - "12:00"
      - "18:00"
    
  test-channel-trial1:
    name: "Test Channel Trial1"
    enabled: false    # 비활성화됨 - 스케줄 실행 안함
    times:
      - "07:30"
      - "12:30"
      - "18:30"

  family-health-kr:
    name: "family-health-kr"
    enabled: true
    times:
      - "06:30"
      - "11:30"
      - "17:30"

