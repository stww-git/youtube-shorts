# 채널별 업로드 스케줄 설정
# 
# 형식:
#   채널ID:
#     name: "표시 이름"
#     enabled: true/false    # 스케줄 실행 여부
#     times: ["HH:MM", ...]  # 한국 시간 (KST)
#
# enabled: false로 설정하면 해당 채널은 스케줄 실행에서 제외됩니다.

channels:
  sokpyeonhan:
    name: "속편한밥상"
    enabled: true
    times:
      - "07:00"
      - "12:00"
      - "18:00"
    
  test-channel-trial1:
    name: "Test Channel Trial1"
    enabled: false    # 비활성화됨 - 스케줄 실행 안함
    times:
      - "07:30"
      - "12:30"
      - "18:30"

  family-health-kr:
    name: "family-health-kr"
    enabled: true
    times:
      - "06:30"
      - "11:30"
      - "17:30"

  money-bite:
    name: "Money Bite"
    enabled: true
    # 한국 타겟 
    times:
      - "07:15"   
      - "12:15"   
      - "18:15"   

  money-bite-jp:
    name: "Money Bite JP"
    enabled: true
    # 일본(JST) 기준: JST 08:00, 13:00, 19:00 -> KST는 동일
    times:
      - "08:00"
      - "13:00"
      - "19:00"

  money-bite-us:
    name: "Money Bite US"
    enabled: true
    # 미국 EST 기준 최적 시간대 (KST 변환)
    # 9 AM EST (KST 23:00) / 12:30 PM EST (KST 02:30) / 8 PM EST (KST 10:00)
    times:
      - "23:00"
      - "02:30"
      - "10:00"

